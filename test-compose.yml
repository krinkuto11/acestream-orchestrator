# Docker Compose configuration for standalone mode (no VPN)
# This is the simplest setup without VPN integration
# 
# Quick Start:
# 1. Run: docker-compose up -d
# 2. Access dashboard at http://localhost:8000/panel to configure settings
#
# Note: Engine cache strictly uses Docker named volumes for better performance 
# and automatic cleanup on engine deletion.

services:
  orchestrator:
    container_name: orchestrator
    build: .
    # Configuration is now handled via the Web UI Settings panel
    # environment:
    #   - API_KEY=optional_api_key
    stop_grace_period: 45s
    ports:
    - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: on-failure
    networks:
      - aceserver

networks:
  aceserver:
    name: aceserver
    driver: bridge
