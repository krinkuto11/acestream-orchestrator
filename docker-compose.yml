# Docker Compose configuration for standalone mode (no VPN)
# This is the simplest setup without VPN integration
# 
# Quick Start:
# 1. Copy .env.example to .env and configure
# 2. Run: docker-compose up -d
# 3. Access dashboard at http://localhost:8000/panel
#
# Note: Engine cache strictly uses Docker named volumes for better performance 
# and automatic cleanup on engine deletion.

services:
  orchestrator:
    container_name: orchestrator
    image: ghcr.io/krinkuto11/acestream-orchestrator:latest
    env_file: .env
    environment:
      - API_KEY=${API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/app/app/config
    restart: on-failure
    networks:
      - aceserver

networks:
  aceserver:
    name: aceserver
    driver: bridge
